<html>

<head>
<title>Portfolio Rebalancer</title>
</head>

<body>

<h2>Amit Sharma Portfolio</h2>

<p>Total Portfolio Value: ₹{{total}}</p>

<table border="1">

<tr>
<th>Fund</th>
<th>Current %</th>
<th>Target %</th>
<th>Action</th>
<th>Amount (₹)</th>
</tr>

{% for r in data %}

<tr>
<td>{{r.fund}}</td>
<td>{{r.current_pct}}</td>
<td>{{r.target_pct}}</td>
<td>{{r.action}}</td>
<td>{{r.amount}}</td>
</tr>

{% endfor %}

</table>

<br>

<h3>Summary</h3>

<p>Total BUY: ₹{{buy}}</p>
<p>Total SELL: ₹{{sell}}</p>
<p>Fresh Money Needed: ₹{{cash}}</p>

</body>

</html>
