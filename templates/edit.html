<!DOCTYPE html>
<html>

<head>
<title>Edit Model Portfolio</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f7fb;
    margin:40px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 4px 15px rgba(0,0,0,0.1);
}

nav{
    margin-bottom:20px;
}

nav a{
    margin-right:15px;
    text-decoration:none;
    color:#1a73e8;
    font-weight:500;
}

nav a:hover{
    text-decoration:underline;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#1a73e8;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    border-bottom:1px solid #eee;
}

input{
    padding:6px;
    width:80px;
}

button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    background:#1a73e8;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0f5fd4;
}

</style>

</head>

<body>

<div class="container">

<h2>Edit Recommended Plan</h2>

<nav>
<a href="/">Comparison</a>
<a href="/holdings">Current Investments</a>
<a href="/history">History</a>
<a href="/edit">Edit Plan</a>
</nav>

<form method="post">

<table>

<tr>
<th>Fund</th>
<th>Target %</th>
</tr>

{% for f in funds %}

<tr>
<td>{{f[1]}}</td>
<td>
<input type="number" name="{{f[0]}}" value="{{f[2]}}">
</td>
</tr>

{% endfor %}

</table>

<button type="submit">Save and Recalculate</button>

</form>

</div>

</body>
</html>
